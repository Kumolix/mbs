<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ Minecraft Battle Simulator ⚔️</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0f18;
            --bg-panel: #0d1622;
            --border-light: #2a4560;
            --text-bright: #e0e8ff;
            --accent-blue: #4a8ec9;
            --box-border: #1e3349;
            --btn-bg: #1a2c3d;
            --btn-active: #3c6b9c;
        }
        
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 5px;
            touch-action: pan-y;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            max-width: 750px;
            width: 100%;
        }
        
        .game-wrapper {
            background: var(--bg-panel);
            padding: 10px 12px 12px 12px;
            border-radius: 24px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
            border: 1px solid var(--border-light);
            width: 100%;
        }
        
        .game-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-bright);
            text-shadow: 0 0 10px var(--accent-blue);
            letter-spacing: 2px;
            margin-bottom: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px var(--accent-blue); }
            to { text-shadow: 0 0 20px var(--accent-blue), 0 0 30px #6ab0ff; }
        }
        
        .canvas-container {
            position: relative;
            touch-action: none;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 0 0 3px var(--box-border), inset 0 0 30px #000000;
            cursor: pointer;
            outline: none;
            width: 100%;
            height: auto;
            touch-action: none;
        }
        
        /* ========== МУЛЬТИПЛЕЕР ПАНЕЛЬ ========== */
        .multiplayer-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
            padding: 10px;
            background: #0e1a26;
            border-radius: 20px;
            border: 1px solid #3d6688;
        }
        
        .mp-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .mp-btn {
            background: var(--btn-bg);
            border: none;
            padding: 8px 14px;
            border-radius: 25px;
            font-family: inherit;
            font-weight: bold;
            font-size: 13px;
            color: #ccdeee;
            box-shadow: inset 0 1px 3px black, 0 3px 0 #0c1822;
            cursor: pointer;
            transition: all 0.1s ease;
            border-bottom: 1px solid #5b8bb9;
        }
        
        .mp-btn.active {
            background: var(--btn-active);
            color: white;
            transform: translateY(2px);
            box-shadow: inset 0 2px 6px black, 0 1px 0 #1a3147;
        }
        
        .mp-btn.green {
            background: #2e8b57;
            border-bottom-color: #3cb371;
        }
        
        .room-list {
            max-height: 150px;
            overflow-y: auto;
            background: #0a1622;
            border-radius: 15px;
            padding: 5px;
        }
        
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1a2c3d;
            border-radius: 15px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid #3d6688;
        }
        
        .room-item:hover {
            background: #243b52;
        }
        
        .room-code {
            font-weight: bold;
            color: #FFD700;
            font-size: 16px;
        }
        
        .room-players {
            color: #8da9cc;
            font-size: 12px;
        }
        
        .code-display {
            color: #FFD700;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 2px;
            background: #0a1622;
            padding: 5px 15px;
            border-radius: 25px;
            border: 1px solid #FFD700;
        }
        
        .status-badge {
            color: #4a8ec9;
            font-weight: bold;
            text-align: center;
        }
        
        .code-input {
            background: #0a1622;
            border: 1px solid #3d6688;
            padding: 8px 12px;
            border-radius: 25px;
            color: #e0e8ff;
            font-family: inherit;
            font-size: 14px;
            text-align: center;
            outline: none;
            width: 120px;
        }
        
        /* ========== ВИРТУАЛЬНЫЙ ДЖОЙСТИК ========== */
        .virtual-controls {
            position: relative;
            display: none;
            margin-top: 8px;
            height: 120px;
            touch-action: none;
        }
        
        .virtual-controls.visible {
            display: block;
        }
        
        .joystick-area {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 120px;
            height: 120px;
            touch-action: none;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(26, 44, 61, 0.7);
            border-radius: 50%;
            border: 3px solid #3d6688;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 0 #0c1822;
            backdrop-filter: blur(5px);
        }
        
        .joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--btn-active);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #85c1e9;
            box-shadow: 0 0 15px #4a8ec9, inset 0 0 10px rgba(255,255,255,0.3);
            transition: box-shadow 0.1s;
            touch-action: none;
        }
        
        .joystick-stick.active {
            box-shadow: 0 0 25px #6ab0ff, inset 0 0 15px rgba(255,255,255,0.5);
        }
        
        .attack-area {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            touch-action: none;
        }
        
        .attack-btn {
            width: 100%;
            height: 100%;
            background: #8b2e2e;
            border-radius: 50%;
            border: 3px solid #c95a5a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 0 #5a1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: all 0.05s;
            touch-action: none;
        }
        
        .attack-btn:active {
            transform: scale(0.95);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 2px 0 #5a1e1e;
            background: #a33a3a;
        }
        
        /* ========== ПАНЕЛЬ УПРАВЛЕНИЯ ========== */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            gap: 8px;
        }
        
        .control-buttons {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: var(--btn-bg);
            border: none;
            padding: 8px 14px;
            border-radius: 25px;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            color: #ccdeee;
            box-shadow: inset 0 1px 3px black, 0 3px 0 #0c1822;
            cursor: pointer;
            transition: all 0.1s ease;
            border-bottom: 1px solid #5b8bb9;
        }
        
        .control-btn:hover {
            background: #243b52;
        }
        
        .control-btn.active {
            background: var(--btn-active);
            color: white;
            transform: translateY(2px);
            box-shadow: inset 0 2px 6px black, 0 1px 0 #1a3147;
        }
        
        .reset-btn {
            background: #8b2e2e;
            border-bottom-color: #c95a5a;
        }
        
        /* ========== ВЫБОР ОРУЖИЯ ========== */
        .weapon-panels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            gap: 10px;
        }
        
        .weapon-menu {
            background: #0e1a26;
            padding: 5px 8px;
            border-radius: 40px;
            border: 1px solid #3d6688;
            box-shadow: inset 0 2px 5px #000000, 0 3px 0 #081016;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .weapon-option {
            background: var(--btn-bg);
            border: none;
            padding: 5px 10px;
            border-radius: 25px;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            color: #ccdeee;
            box-shadow: inset 0 1px 3px black, 0 2px 0 #0c1822;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 3px;
            border-bottom: 1px solid #5b8bb9;
        }
        
        .weapon-option.active {
            background: var(--btn-active);
            color: white;
            transform: translateY(1px);
            box-shadow: inset 0 2px 6px black, 0 1px 0 #1a3147;
        }
        
        .weapon-label {
            color: #b6d0e8;
            font-size: 14px;
            margin-right: 3px;
        }
        
        /* ========== ИНФОРМАЦИЯ ========== */
        .debug-info {
            color: #6a8aaa;
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
        }
        
        .hint-bar {
            display: flex;
            justify-content: space-between;
            margin: 5px 3px 0 3px;
            color: #8da9cc;
            font-weight: bold;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-wrapper">
        <div class="game-title">⚔️ Minecraft Battle Simulator ⚔️</div>
        
        <!-- Мультиплеер панель -->
        <div class="multiplayer-panel">
            <div class="mp-row">
                <button class="mp-btn" id="hostBtn">🎮 СОЗДАТЬ</button>
                <button class="mp-btn" id="refreshBtn">🔄 ОБНОВИТЬ</button>
                <button class="mp-btn" id="leaveBtn" style="display:none;">🚪 ВЫЙТИ</button>
            </div>
            <div class="room-list" id="roomList">
                <div style="color:#6a8aaa;text-align:center;">Нажми "ОБНОВИТЬ"</div>
            </div>
            <div class="mp-row">
                <span class="code-display" id="codeDisplay"></span>
                <span class="status-badge" id="connectionStatus"></span>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="gameCanvas" width="700" height="700"></canvas>
        </div>
        
        <div class="virtual-controls" id="virtualControls">
            <div class="joystick-area" id="joystickArea">
                <div class="joystick-base"></div>
                <div class="joystick-stick" id="joystickStick"></div>
            </div>
            <div class="attack-area" id="attackArea">
                <div class="attack-btn" id="attackBtn">⚔️</div>
            </div>
        </div>
        
        <div class="control-bar">
            <div class="control-buttons">
                <button class="control-btn" id="joystickToggle">🎮 ДЖОЙСТИК</button>
                <button class="control-btn reset-btn" id="resetButton">🔄 РЕСЕТ</button>
            </div>
            <div class="debug-info" id="debugInfo"></div>
        </div>
        
        <div class="weapon-panels">
            <div class="weapon-menu">
                <span class="weapon-label">P1</span>
                <button class="weapon-option" data-player="blue" data-weapon="rod">🎣</button>
                <button class="weapon-option" data-player="blue" data-weapon="axe">🪓</button>
                <button class="weapon-option" data-player="blue" data-weapon="tnt">🧨</button>
                <button class="weapon-option" data-player="blue" data-weapon="bow">🏹</button>
                <button class="weapon-option" data-player="blue" data-weapon="shield">🛡️</button>
                <button class="weapon-option" data-player="blue" data-weapon="bell">🔔</button>
                <button class="weapon-option active" data-player="blue" data-weapon="blaze">🔥</button>
            </div>
            <div class="weapon-menu">
                <span class="weapon-label">P2/BOT</span>
                <button class="weapon-option" data-player="red" data-weapon="rod">🎣</button>
                <button class="weapon-option active" data-player="red" data-weapon="axe">🪓</button>
                <button class="weapon-option" data-player="red" data-weapon="tnt">🧨</button>
                <button class="weapon-option" data-player="red" data-weapon="bow">🏹</button>
                <button class="weapon-option" data-player="red" data-weapon="shield">🛡️</button>
                <button class="weapon-option" data-player="red" data-weapon="bell">🔔</button>
                <button class="weapon-option" data-player="red" data-weapon="blaze">🔥</button>
            </div>
        </div>
        
        <div class="hint-bar">
            <span>⬆️⬇️⬅️➡️ / СТИК</span>
            <span>␣ / ⚔️ — АТАКА | КЛИК — СТАРТ</span>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";
        
        // ==================== FIREBASE КОНФИГ ====================
        const firebaseConfig = {
            databaseURL: "https://mbsim-313c1-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // ==================== КОНФИГ ИГРЫ ====================
        const CONFIG = {
            CANVAS_SIZE: 700,
            BOX_SIZE: 580,
            PLAYER_RADIUS: 33,
            MAX_SPEED: 450,
            MIN_SPEED: 140,
            BLUE_ACCEL: 1600,
            RED_ACCEL: 1200,
            FRICTION: 0.995,
            TNT_COOLDOWN: 600,
            TNT_RADIUS: 200,
            TNT_DAMAGE_MIN: 5,
            TNT_DAMAGE_MAX: 15,
            POISON_DURATION: 420,
            POISON_DAMAGE: 1,
            ROD_COOLDOWN: 180,
            HOOK_SPEED: 5.5,
            ROD_DAMAGE_PER_BOUNCE: 8,
            MAX_BOUNCES: 5,
            AXE_COOLDOWN: 60,
            AXE_DAMAGE: 8,
            AXE_ORBIT_RADIUS: 55,
            AXE_ROTATION_SPEED: 0.0435,
            AXE_KNOCKBACK: 400,
            AXE_HITBOX_RADIUS: 50,
            AXE_OFFSET_X: 15,
            AXE_OFFSET_Y: -10,
            BOW_COOLDOWN: 60,
            BOW_MAX_CHARGE: 60,
            BOW_MIN_DAMAGE: 1,
            BOW_MAX_DAMAGE: 15,
            ARROW_SPEED: 5,
            ARROW_HOMING_STRENGTH: 0.15,
            SHIELD_MAX_STAMINA: 180,
            SHIELD_COOLDOWN: 300,
            SHIELD_REFLECT_PERCENT: 0.7,
            SHIELD_SPEED_MULTIPLIER: 0.6,
            BELL_COOLDOWN: 120,
            BELL_WAVE_RADIUS: 250,
            BELL_WAVE_DAMAGE: 2,
            BELL_WALL_DAMAGE: 5,
            BELL_KNOCKBACK: 280,
            BLAZE_COOLDOWN: 180,
            BLAZE_DAMAGE: 5,
            BLAZE_SPEED: 5,
            BLAZE_SPREAD: 20,
            BLAZE_ORBIT_RADIUS: 45,
            BLAZE_ROTATION_SPEED: 0.05,
            BLAZE_HOMING_STRENGTH: 0.08,
            BOT_SHOOT_CHANCE: 0.03,
            BOT_TNT_DISTANCE: 80
        };
        
        // ==================== ТЕКСТУРЫ ====================
        const TEXTURES = {
            rod: 'https://ru.minecraft.wiki/images/Удочка_JE2_BE2.png?c36e9',
            axe: 'https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png?99125',
            tnt: 'https://ru.minecraft.wiki/images/ТНТ_JE3_BE2.png?a673a',
            bow: 'https://ru.minecraft.wiki/images/Анимация_лука.gif?499e9',
            shield: 'https://minecraft.wiki/images/Shield_JE2_BE1.png?4837d',
            bell: 'https://ru.minecraft.wiki/images/Потолковый_колокол.png?cc20d',
            blaze_rod: 'https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/blaze_rod.png',
            fire_charge: 'https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/fire_charge.png'
        };
        
        const weaponImages = {};
        const imageLoaded = {};
        for (let [key, src] of Object.entries(TEXTURES)) {
            weaponImages[key] = new Image();
            weaponImages[key].src = src;
            imageLoaded[key] = false;
            weaponImages[key].onload = () => imageLoaded[key] = true;
        }
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debugInfo');
        const W = CONFIG.CANVAS_SIZE, H = CONFIG.CANVAS_SIZE;
        
        const BOX = {
            x: (W - CONFIG.BOX_SIZE) / 2,
            y: (H - CONFIG.BOX_SIZE) / 2,
            w: CONFIG.BOX_SIZE,
            h: CONFIG.BOX_SIZE
        };
        
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        let gameStarted = false;
        let animationId = null;
        let lastTimestamp = 0;
        
        // Мультиплеер
        let roomId = null;
        let playerRole = null; // 'blue' или 'red'
        let isMultiplayer = false;
        let opponentConnected = false;
        let roomRef = null;
        
        // Игроки
        let blue, red;
        
        // Объекты оружия
        let tntMarks = [], poisonClouds = [], wallMarks = [], arrows = [], bellWaves = [], blazeBalls = [];
        let blueHook = null, redHook = null;
        let axeAngle = 0, axeCooldown = 0;
        
        // Управление
        const keys = { up: false, down: false, left: false, right: false, space: false };
        let spacePressed = false;
        let joystickActive = false, joystickVector = { x: 0, y: 0 }, attackPressed = false;
        
        // UI элементы
        const roomListEl = document.getElementById('roomList');
        const codeDisplay = document.getElementById('codeDisplay');
        const statusEl = document.getElementById('connectionStatus');
        const leaveBtn = document.getElementById('leaveBtn');
        
        // ==================== СОЗДАНИЕ ИГРОКА ====================
        function createPlayer(side, x, y) {
            return {
                x, y, vx: 0, vy: 0,
                hp: 100, maxHp: 100,
                weapon: side === 'blue' ? 'blaze' : 'axe',
                facing: side === 'blue' ? 1 : -1,
                tntCooldown: 0, rodCooldown: 0, bowCooldown: 0, blazeCooldown: 0,
                bowCharge: 0, bowCharging: false, bowTarget: null,
                shieldActive: false, shieldStamina: CONFIG.SHIELD_MAX_STAMINA, shieldCooldown: 0,
                bellCooldown: 0,
                hitWall: false, wallHitTimer: 0, hitEffect: 0,
                blazeAngle: 0
            };
        }
        
        function resetPlayers() {
            blue = createPlayer('blue', BOX.x + CONFIG.PLAYER_RADIUS + 20, BOX.y + CONFIG.PLAYER_RADIUS + 20);
            red = createPlayer('red', BOX.x + BOX.w - CONFIG.PLAYER_RADIUS - 20, BOX.y + BOX.h - CONFIG.PLAYER_RADIUS - 20);
            red.vx = 30; red.vy = 25;
        }
        resetPlayers();
        
        // ==================== FIREBASE МУЛЬТИПЛЕЕР ====================
        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        
        function createRoom() {
            roomId = generateRoomCode();
            roomRef = db.ref('rooms/' + roomId);
            
            roomRef.set({
                host: { connected: true, timestamp: firebase.database.ServerValue.TIMESTAMP },
                guest: null,
                gameState: null,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            
            playerRole = 'blue';
            isMultiplayer = true;
            codeDisplay.textContent = roomId;
            statusEl.textContent = '⏳ Ожидание игрока...';
            leaveBtn.style.display = 'inline-block';
            
            // Слушаем подключение гостя
            roomRef.child('guest').on('value', (snapshot) => {
                const guest = snapshot.val();
                if (guest && guest.connected) {
                    opponentConnected = true;
                    statusEl.textContent = '🎮 Игрок подключился!';
                }
            });
            
            // Хост получает данные от гостя (красный игрок)
            roomRef.child('gameState/red').on('value', (snapshot) => {
                const redState = snapshot.val();
                if (redState && !gameStarted) {
                    red.x = redState.x;
                    red.y = redState.y;
                    red.hp = redState.hp;
                    red.weapon = redState.weapon;
                    red.facing = redState.facing;
                }
            });
            
            // Автоудаление комнаты при выходе
            roomRef.child('host/connected').onDisconnect().set(false);
            roomRef.child('host').onDisconnect().remove();
        }
        
        function joinRoom(code) {
            roomId = code.toUpperCase();
            roomRef = db.ref('rooms/' + roomId);
            
            roomRef.once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    statusEl.textContent = '❌ Комната не найдена';
                    return;
                }
                
                const room = snapshot.val();
                if (room.guest && room.guest.connected) {
                    statusEl.textContent = '❌ Комната занята';
                    return;
                }
                
                roomRef.child('guest').set({
                    connected: true,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                
                playerRole = 'red';
                isMultiplayer = true;
                opponentConnected = true;
                codeDisplay.textContent = roomId;
                statusEl.textContent = '✅ Подключено!';
                leaveBtn.style.display = 'inline-block';
                
                // Гость получает данные от хоста (синий игрок и снаряды)
                roomRef.child('gameState').on('value', (snapshot) => {
                    const state = snapshot.val();
                    if (state) {
                        if (state.blue) {
                            blue.x = state.blue.x;
                            blue.y = state.blue.y;
                            blue.hp = state.blue.hp;
                            blue.weapon = state.blue.weapon;
                            blue.facing = state.blue.facing;
                        }
                        if (state.projectiles) {
                            arrows = state.projectiles.arrows || [];
                            blazeBalls = state.projectiles.blazeBalls || [];
                            tntMarks = state.projectiles.tntMarks || [];
                            poisonClouds = state.projectiles.poisonClouds || [];
                            bellWaves = state.projectiles.bellWaves || [];
                        }
                    }
                });
                
                roomRef.child('guest/connected').onDisconnect().set(false);
                roomRef.child('guest').onDisconnect().remove();
            });
        }
        
        function leaveRoom() {
            if (roomRef) {
                if (playerRole === 'blue') {
                    roomRef.child('host/connected').set(false);
                    roomRef.remove();
                } else {
                    roomRef.child('guest/connected').set(false);
                    roomRef.child('guest').remove();
                }
            }
            
            roomId = null;
            playerRole = null;
            isMultiplayer = false;
            opponentConnected = false;
            gameStarted = false;
            codeDisplay.textContent = '';
            statusEl.textContent = '';
            leaveBtn.style.display = 'none';
            resetPlayers();
        }
        
        function refreshRoomList() {
            const roomsRef = db.ref('rooms');
            roomsRef.once('value', (snapshot) => {
                const rooms = snapshot.val();
                roomListEl.innerHTML = '';
                
                if (!rooms) {
                    roomListEl.innerHTML = '<div style="color:#6a8aaa;text-align:center;">Нет активных комнат</div>';
                    return;
                }
                
                Object.entries(rooms).forEach(([code, room]) => {
                    if (!room.host?.connected) return;
                    
                    const hasGuest = room.guest?.connected;
                    if (hasGuest) return; // Не показываем занятые комнаты
                    
                    const roomDiv = document.createElement('div');
                    roomDiv.className = 'room-item';
                    roomDiv.innerHTML = `
                        <span class="room-code">${code}</span>
                        <span class="room-players">👤 1/2</span>
                    `;
                    roomDiv.addEventListener('click', () => joinRoom(code));
                    roomListEl.appendChild(roomDiv);
                });
                
                if (roomListEl.children.length === 0) {
                    roomListEl.innerHTML = '<div style="color:#6a8aaa;text-align:center;">Нет доступных комнат</div>';
                }
            });
        }
        
        function sendGameState() {
            if (!roomRef || !playerRole) return;
            
            if (playerRole === 'blue') {
                // Хост отправляет всё
                roomRef.child('gameState').set({
                    blue: {
                        x: blue.x, y: blue.y, vx: blue.vx, vy: blue.vy,
                        hp: blue.hp, weapon: blue.weapon, facing: blue.facing
                    },
                    red: {
                        x: red.x, y: red.y, vx: red.vx, vy: red.vy,
                        hp: red.hp, weapon: red.weapon, facing: red.facing
                    },
                    projectiles: {
                        arrows: arrows,
                        blazeBalls: blazeBalls,
                        tntMarks: tntMarks,
                        poisonClouds: poisonClouds,
                        bellWaves: bellWaves
                    }
                });
            } else {
                // Гость отправляет только своего красного
                roomRef.child('gameState/red').set({
                    x: red.x, y: red.y, vx: red.vx, vy: red.vy,
                    hp: red.hp, weapon: red.weapon, facing: red.facing
                });
            }
        }
        
        // ==================== ФИЗИКА ====================
        function clampInBox(e, checkWallHit = false) {
            const R = CONFIG.PLAYER_RADIUS;
            let hit = false;
            if (e.x - R < BOX.x) { e.x = BOX.x + R; e.vx = Math.abs(e.vx); hit = true; }
            else if (e.x + R > BOX.x + BOX.w) { e.x = BOX.x + BOX.w - R; e.vx = -Math.abs(e.vx); hit = true; }
            if (e.y - R < BOX.y) { e.y = BOX.y + R; e.vy = Math.abs(e.vy); hit = true; }
            else if (e.y + R > BOX.y + BOX.h) { e.y = BOX.y + BOX.h - R; e.vy = -Math.abs(e.vy); hit = true; }
            
            if (checkWallHit && hit) { e.hitWall = true; e.wallHitTimer = 10; }
            return hit;
        }
        
        function handleCollision() {
            const R = CONFIG.PLAYER_RADIUS;
            const dx = red.x - blue.x, dy = red.y - blue.y;
            const dist = Math.sqrt(dx*dx + dy*dy), minDist = R * 2;
            if (dist < minDist && dist > 0.001) {
                const nx = dx / dist, ny = dy / dist, overlap = minDist - dist;
                blue.x -= nx * overlap * 0.5; blue.y -= ny * overlap * 0.5;
                red.x += nx * overlap * 0.5; red.y += ny * overlap * 0.5;
                const redVn = red.vx * nx + red.vy * ny;
                if (redVn < 0) { red.vx -= 2 * redVn * nx; red.vy -= 2 * redVn * ny; }
                const blueVn = blue.vx * nx + blue.vy * ny;
                if (blueVn > 0) { blue.vx -= 2 * blueVn * nx; blue.vy -= 2 * blueVn * ny; }
            }
        }
        
        function applyDamage(target, amount, source) {
            let dmg = amount, ref = 0;
            if (target === blue && blue.shieldActive) {
                ref = Math.floor(amount * CONFIG.SHIELD_REFLECT_PERCENT);
                dmg = amount - ref;
                if (ref > 0 && source === 'red') red.hp = Math.max(0, red.hp - ref);
            }
            if (target === red && red.shieldActive) {
                ref = Math.floor(amount * CONFIG.SHIELD_REFLECT_PERCENT);
                dmg = amount - ref;
                if (ref > 0 && source === 'blue') blue.hp = Math.max(0, blue.hp - ref);
            }
            target.hp = Math.max(0, target.hp - dmg);
            if (amount > 0) target.hitEffect = 5;
        }
        
        function createHook(owner, target) {
            const dx = target.x - owner.x, dy = target.y - owner.y, dist = Math.hypot(dx, dy);
            let vx = owner.facing * CONFIG.HOOK_SPEED, vy = 0;
            if (dist > 0) {
                const ta = Math.atan2(dy, dx), ba = owner.facing > 0 ? 0 : Math.PI;
                let diff = ta - ba;
                while (diff > Math.PI) diff -= 2*Math.PI;
                while (diff < -Math.PI) diff += 2*Math.PI;
                const ha = ba + diff * 0.8;
                vx = Math.cos(ha) * CONFIG.HOOK_SPEED;
                vy = Math.sin(ha) * CONFIG.HOOK_SPEED;
            }
            return { x: owner.x, y: owner.y, vx, vy, bounces: 0, caught: null, owner: owner===blue?'blue':'red', returning: false };
        }
        
        function shootArrow(owner) {
            const charge = owner.bowCharge / CONFIG.BOW_MAX_CHARGE;
            const damage = Math.floor(CONFIG.BOW_MIN_DAMAGE + charge * (CONFIG.BOW_MAX_DAMAGE - CONFIG.BOW_MIN_DAMAGE));
            let vx, vy;
            if (owner.bowTarget) {
                const dx = owner.bowTarget.x - owner.x, dy = owner.bowTarget.y - owner.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0) { vx = (dx/dist)*CONFIG.ARROW_SPEED; vy = (dy/dist)*CONFIG.ARROW_SPEED; }
                else { vx = owner.facing*CONFIG.ARROW_SPEED; vy = 0; }
            } else { vx = owner.facing*CONFIG.ARROW_SPEED; vy = 0; }
            arrows.push({
                x: owner.x, y: owner.y, vx, vy, owner: owner===blue?'blue':'red',
                damage, homingTarget: owner===blue?red:blue, life: 180
            });
            owner.bowCooldown = CONFIG.BOW_COOLDOWN;
            owner.bowCharging = false;
            owner.bowCharge = 0;
            owner.bowTarget = null;
        }
        
        function createBellWave(owner) {
            bellWaves.push({
                x: owner.x, y: owner.y, radius: 20, maxRadius: CONFIG.BELL_WAVE_RADIUS,
                owner: owner === blue ? 'blue' : 'red', damage: CONFIG.BELL_WAVE_DAMAGE,
                damaged: new Set(), life: 1.0
            });
        }
        
        function shootBlaze(owner) {
            const baseAngle = owner.facing > 0 ? 0 : Math.PI;
            const angles = [-CONFIG.BLAZE_SPREAD, 0, CONFIG.BLAZE_SPREAD];
            const target = owner === blue ? red : blue;
            
            angles.forEach(angleOffset => {
                let rad = baseAngle + (angleOffset * Math.PI / 180);
                
                const dx = target.x - owner.x, dy = target.y - owner.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0) {
                    const targetAngle = Math.atan2(dy, dx);
                    let diff = targetAngle - rad;
                    while (diff > Math.PI) diff -= 2*Math.PI;
                    while (diff < -Math.PI) diff += 2*Math.PI;
                    rad += diff * CONFIG.BLAZE_HOMING_STRENGTH;
                }
                
                blazeBalls.push({
                    x: owner.x, y: owner.y,
                    vx: Math.cos(rad) * CONFIG.BLAZE_SPEED,
                    vy: Math.sin(rad) * CONFIG.BLAZE_SPEED,
                    owner: owner === blue ? 'blue' : 'red',
                    damage: CONFIG.BLAZE_DAMAGE,
                    life: 150,
                    homingTarget: target
                });
            });
            
            owner.blazeCooldown = CONFIG.BLAZE_COOLDOWN;
        }
        
        function botAI() {
            if (!gameStarted || isMultiplayer) return;
            if (red.weapon === 'tnt' && red.tntCooldown <= 0) {
                tntMarks.push({ x: Math.max(BOX.x, Math.min(BOX.x+BOX.w, red.x+red.facing*CONFIG.BOT_TNT_DISTANCE)), y: red.y, owner: 'red', timer: 60 });
                red.tntCooldown = CONFIG.TNT_COOLDOWN;
            }
            if (red.weapon === 'rod' && red.rodCooldown <= 0 && !redHook) redHook = createHook(red, blue);
            if (red.weapon === 'bow' && red.bowCooldown <= 0) {
                if (!red.bowCharging) { red.bowCharging = true; red.bowCharge = 0; red.bowTarget = { x: blue.x, y: blue.y }; }
            }
            if (red.bowCharging) {
                red.bowCharge = Math.min(red.bowCharge+1, CONFIG.BOW_MAX_CHARGE);
                red.bowTarget = { x: blue.x, y: blue.y };
                if (red.bowCharge >= CONFIG.BOW_MAX_CHARGE || Math.random() < CONFIG.BOT_SHOOT_CHANCE) shootArrow(red);
            }
            if (red.weapon === 'shield') {
                if (red.shieldCooldown <= 0 && red.shieldStamina > 0) {
                    red.shieldActive = true; red.shieldStamina--;
                    if (red.shieldStamina <= 0) { red.shieldActive = false; red.shieldCooldown = CONFIG.SHIELD_COOLDOWN; red.shieldStamina = CONFIG.SHIELD_MAX_STAMINA; }
                } else red.shieldActive = false;
            }
            if (red.weapon === 'bell' && red.bellCooldown <= 0 && red.hitWall) {
                createBellWave(red);
                red.bellCooldown = CONFIG.BELL_COOLDOWN;
            }
            if (red.weapon === 'blaze' && red.blazeCooldown <= 0) {
                shootBlaze(red);
            }
        }
        
        function updateCooldowns() {
            [blue, red].forEach(p => {
                if (p.tntCooldown > 0) p.tntCooldown--;
                if (p.rodCooldown > 0) p.rodCooldown--;
                if (p.bowCooldown > 0) p.bowCooldown--;
                if (p.shieldCooldown > 0) p.shieldCooldown--;
                if (p.bellCooldown > 0) p.bellCooldown--;
                if (p.blazeCooldown > 0) p.blazeCooldown--;
                if (!p.shieldActive && p.shieldStamina < CONFIG.SHIELD_MAX_STAMINA && p.shieldCooldown <= 0) 
                    p.shieldStamina = Math.min(p.shieldStamina+1, CONFIG.SHIELD_MAX_STAMINA);
                if (p.wallHitTimer > 0) p.wallHitTimer--; else p.hitWall = false;
                if (p.hitEffect > 0) p.hitEffect--;
                if (p.weapon === 'blaze') p.blazeAngle = (p.blazeAngle || 0) + CONFIG.BLAZE_ROTATION_SPEED;
            });
            if (axeCooldown > 0) axeCooldown--;
        }
        
        function handleInput() {
            const player = playerRole === 'blue' ? blue : red;
            const opponent = playerRole === 'blue' ? red : blue;
            
            if (joystickActive) {
                const dz = 0.2;
                if (Math.abs(joystickVector.x) > dz || Math.abs(joystickVector.y) > dz) {
                    keys.up = joystickVector.y < -dz;
                    keys.down = joystickVector.y > dz;
                    keys.left = joystickVector.x < -dz;
                    keys.right = joystickVector.x > dz;
                } else {
                    keys.up = keys.down = keys.left = keys.right = false;
                }
            }
            
            const attackNow = keys.space || attackPressed;
            
            if (player.weapon === 'bow') {
                if (attackNow && player.bowCooldown <= 0) {
                    if (!player.bowCharging) { player.bowCharging = true; player.bowCharge = 0; player.bowTarget = { x: opponent.x, y: opponent.y }; }
                    player.bowCharge = Math.min(player.bowCharge+1, CONFIG.BOW_MAX_CHARGE);
                    player.bowTarget = { x: opponent.x, y: opponent.y };
                } else if (player.bowCharging) {
                    shootArrow(player);
                }
            }
            
            if (player.weapon === 'shield') {
                if (attackNow && player.shieldCooldown <= 0 && player.shieldStamina > 0) {
                    player.shieldActive = true; player.shieldStamina--;
                    if (player.shieldStamina <= 0) { player.shieldActive = false; player.shieldCooldown = CONFIG.SHIELD_COOLDOWN; player.shieldStamina = CONFIG.SHIELD_MAX_STAMINA; }
                } else {
                    player.shieldActive = false;
                }
            }
            
            const attackEdge = attackNow && !spacePressed;
            if (attackEdge) {
                if (player.weapon === 'tnt' && player.tntCooldown <= 0) {
                    tntMarks.push({ x: Math.max(BOX.x, Math.min(BOX.x+BOX.w, player.x+player.facing*80)), y: player.y, owner: playerRole, timer: 60 });
                    player.tntCooldown = CONFIG.TNT_COOLDOWN;
                } else if (player.weapon === 'rod' && player.rodCooldown <= 0 && !blueHook && !redHook) {
                    if (playerRole === 'blue') blueHook = createHook(blue, red);
                    else redHook = createHook(red, blue);
                } else if (player.weapon === 'bell' && player.bellCooldown <= 0 && player.hitWall) {
                    createBellWave(player);
                    player.bellCooldown = CONFIG.BELL_COOLDOWN;
                } else if (player.weapon === 'blaze' && player.blazeCooldown <= 0) {
                    shootBlaze(player);
                }
            }
            spacePressed = attackNow;
        }
        
        function updateProjectiles() {
            blazeBalls = blazeBalls.filter(b => {
                if (b.homingTarget) {
                    const dx = b.homingTarget.x - b.x, dy = b.homingTarget.y - b.y, dist = Math.hypot(dx, dy);
                    if (dist > 0) {
                        b.vx += (dx/dist) * 0.05;
                        b.vy += (dy/dist) * 0.05;
                        const sp = Math.hypot(b.vx, b.vy);
                        if (sp > CONFIG.BLAZE_SPEED * 1.3) { b.vx *= (CONFIG.BLAZE_SPEED * 1.3)/sp; b.vy *= (CONFIG.BLAZE_SPEED * 1.3)/sp; }
                    }
                }
                b.x += b.vx; b.y += b.vy; b.life--;
                if (b.x < BOX.x || b.x > BOX.x+BOX.w || b.y < BOX.y || b.y > BOX.y+BOX.h || b.life <= 0) return false;
                const t = b.owner === 'blue' ? red : blue;
                if (Math.hypot(b.x-t.x, b.y-t.y) < CONFIG.PLAYER_RADIUS + 10) { applyDamage(t, b.damage, b.owner); return false; }
                return true;
            });
            
            arrows = arrows.filter(a => {
                if (a.homingTarget) {
                    const dx = a.homingTarget.x - a.x, dy = a.homingTarget.y - a.y, dist = Math.hypot(dx, dy);
                    if (dist > 0) {
                        a.vx += (dx/dist)*CONFIG.ARROW_HOMING_STRENGTH;
                        a.vy += (dy/dist)*CONFIG.ARROW_HOMING_STRENGTH;
                        const sp = Math.hypot(a.vx, a.vy);
                        if (sp > CONFIG.ARROW_SPEED*1.5) { a.vx *= (CONFIG.ARROW_SPEED*1.5)/sp; a.vy *= (CONFIG.ARROW_SPEED*1.5)/sp; }
                    }
                }
                a.x += a.vx; a.y += a.vy; a.life--;
                if (a.x < BOX.x || a.x > BOX.x+BOX.w || a.y < BOX.y || a.y > BOX.y+BOX.h || a.life <= 0) return false;
                const t = a.owner === 'blue' ? red : blue;
                if (Math.hypot(a.x-t.x, a.y-t.y) < CONFIG.PLAYER_RADIUS+10) { applyDamage(t, a.damage, a.owner); return false; }
                return true;
            });
            
            bellWaves = bellWaves.filter(w => {
                w.radius += 12;
                w.life = Math.max(0, 1 - w.radius / w.maxRadius);
                if (w.radius >= w.maxRadius) return false;
                const t = w.owner === 'blue' ? red : blue;
                const dist = Math.hypot(w.x - t.x, w.y - t.y);
                if (dist < w.radius && dist > w.radius - 25 && !w.damaged.has(t)) {
                    applyDamage(t, w.damage, w.owner);
                    w.damaged.add(t);
                    const ang = Math.atan2(t.y - w.y, t.x - w.x);
                    t.vx += Math.cos(ang) * CONFIG.BELL_KNOCKBACK;
                    t.vy += Math.sin(ang) * CONFIG.BELL_KNOCKBACK;
                }
                return true;
            });
            
            tntMarks = tntMarks.filter(m => {
                m.timer--;
                if (m.timer <= 0) {
                    [blue, red].forEach(t => {
                        if (m.owner==='blue' && t===blue) return;
                        if (m.owner==='red' && t===red) return;
                        const dist = Math.hypot(m.x-t.x, m.y-t.y);
                        if (dist < CONFIG.TNT_RADIUS) {
                            const dmg = Math.round(CONFIG.TNT_DAMAGE_MAX - (dist/CONFIG.TNT_RADIUS)*(CONFIG.TNT_DAMAGE_MAX-CONFIG.TNT_DAMAGE_MIN));
                            applyDamage(t, dmg, m.owner);
                        }
                    });
                    poisonClouds.push({ x: m.x, y: m.y, timer: CONFIG.POISON_DURATION, owner: m.owner });
                    return false;
                }
                return true;
            });
            
            poisonClouds = poisonClouds.filter(c => {
                c.timer--;
                if (c.timer <= 0) return false;
                if (c.timer % 60 === 0) {
                    [blue, red].forEach(t => {
                        if (c.owner==='blue' && t===blue) return;
                        if (c.owner==='red' && t===red) return;
                        if (Math.hypot(c.x-t.x, c.y-t.y) < CONFIG.TNT_RADIUS) applyDamage(t, CONFIG.POISON_DAMAGE, c.owner);
                    });
                }
                return true;
            });
            
            [blueHook, redHook].forEach(h => {
                if (!h) return;
                if (h.returning) {
                    const o = h.owner==='blue'?blue:red;
                    const dx = o.x-h.x, dy = o.y-h.y, dist = Math.hypot(dx, dy);
                    if (dist < 30) {
                        if (h.owner==='blue') { blueHook = null; blue.rodCooldown = CONFIG.ROD_COOLDOWN; }
                        else { redHook = null; red.rodCooldown = CONFIG.ROD_COOLDOWN; }
                    } else { h.x += (dx/dist)*CONFIG.HOOK_SPEED*1.5; h.y += (dy/dist)*CONFIG.HOOK_SPEED*1.5; }
                    return;
                }
                h.x += h.vx; h.y += h.vy;
                if (h.x < BOX.x || h.x > BOX.x+BOX.w) { h.vx = -h.vx; h.bounces++; h.x = Math.max(BOX.x, Math.min(BOX.x+BOX.w, h.x)); wallMarks.push({ x: h.x, y: h.y, timer: 30 }); }
                if (h.y < BOX.y || h.y > BOX.y+BOX.h) { h.vy = -h.vy; h.bounces++; h.y = Math.max(BOX.y, Math.min(BOX.y+BOX.h, h.y)); wallMarks.push({ x: h.x, y: h.y, timer: 30 }); }
                const t = h.owner==='blue'?red:blue;
                if (!h.caught) {
                    if (Math.hypot(h.x-t.x, h.y-t.y) < CONFIG.PLAYER_RADIUS+5) {
                        h.caught = t;
                        applyDamage(t, h.bounces*CONFIG.ROD_DAMAGE_PER_BOUNCE, h.owner);
                        h.returning = true;
                    }
                } else {
                    const o = h.owner==='blue'?blue:red;
                    h.caught.x += (o.x-h.caught.x)*0.15;
                    h.caught.y += (o.y-h.caught.y)*0.15;
                }
                if (h.bounces >= CONFIG.MAX_BOUNCES) h.returning = true;
            });
            
            [blue, red].forEach(o => {
                if (o.weapon !== 'axe') return;
                let ax = o.x + Math.cos(axeAngle) * CONFIG.AXE_ORBIT_RADIUS + CONFIG.AXE_OFFSET_X;
                let ay = o.y + Math.sin(axeAngle) * CONFIG.AXE_ORBIT_RADIUS + CONFIG.AXE_OFFSET_Y;
                const t = o === blue ? red : blue;
                if (Math.hypot(ax - t.x, ay - t.y) < CONFIG.AXE_HITBOX_RADIUS + CONFIG.PLAYER_RADIUS && axeCooldown <= 0) {
                    applyDamage(t, CONFIG.AXE_DAMAGE, o === blue ? 'blue' : 'red');
                    const ang = Math.atan2(t.y - ay, t.x - ax);
                    t.vx = Math.cos(ang) * CONFIG.AXE_KNOCKBACK;
                    t.vy = Math.sin(ang) * CONFIG.AXE_KNOCKBACK;
                    axeCooldown = CONFIG.AXE_COOLDOWN;
                }
            });
            axeAngle += CONFIG.AXE_ROTATION_SPEED;
            
            wallMarks = wallMarks.filter(m => --m.timer > 0);
        }
        
        function updateMovement(dt) {
            if (!gameStarted) return;
            if (blue.hp <= 0 || red.hp <= 0) { gameStarted = false; return; }
            
            const mult = blue.shieldActive ? CONFIG.SHIELD_SPEED_MULTIPLIER : 1;
            if (!isMultiplayer || playerRole === 'blue') {
                let ax = 0, ay = 0;
                if (keys.up) ay = -CONFIG.BLUE_ACCEL * mult;
                if (keys.down) ay = CONFIG.BLUE_ACCEL * mult;
                if (keys.left) ax = -CONFIG.BLUE_ACCEL * mult;
                if (keys.right) ax = CONFIG.BLUE_ACCEL * mult;
                blue.vx += ax * (dt/1000); blue.vy += ay * (dt/1000);
                blue.vx *= CONFIG.FRICTION; blue.vy *= CONFIG.FRICTION;
                let sp = Math.hypot(blue.vx, blue.vy);
                if (sp > CONFIG.MAX_SPEED) { blue.vx *= CONFIG.MAX_SPEED/sp; blue.vy *= CONFIG.MAX_SPEED/sp; }
                if ((keys.up||keys.down||keys.left||keys.right) && sp < CONFIG.MIN_SPEED && sp > 0.1) {
                    blue.vx = blue.vx/sp*CONFIG.MIN_SPEED; blue.vy = blue.vy/sp*CONFIG.MIN_SPEED;
                }
                blue.x += blue.vx * (dt/1000); blue.y += blue.vy * (dt/1000);
                clampInBox(blue, true);
            }
            
            if (!isMultiplayer || playerRole === 'red') {
                if (!isMultiplayer) {
                    let rsp = Math.hypot(red.vx, red.vy);
                    if (rsp < CONFIG.MAX_SPEED) {
                        let nsp = Math.min(rsp + CONFIG.RED_ACCEL*(dt/1000), CONFIG.MAX_SPEED);
                        if (rsp > 0.001) { red.vx = red.vx/rsp*nsp; red.vy = red.vy/rsp*nsp; }
                        else { let a = Math.random()*2*Math.PI; red.vx = Math.cos(a)*nsp; red.vy = Math.sin(a)*nsp; }
                    } else { red.vx = red.vx/rsp*CONFIG.MAX_SPEED; red.vy = red.vy/rsp*CONFIG.MAX_SPEED; }
                    red.x += red.vx * (dt/1000); red.y += red.vy * (dt/1000);
                } else {
                    let ax = 0, ay = 0;
                    if (keys.up) ay = -CONFIG.BLUE_ACCEL;
                    if (keys.down) ay = CONFIG.BLUE_ACCEL;
                    if (keys.left) ax = -CONFIG.BLUE_ACCEL;
                    if (keys.right) ax = CONFIG.BLUE_ACCEL;
                    red.vx += ax * (dt/1000); red.vy += ay * (dt/1000);
                    red.vx *= CONFIG.FRICTION; red.vy *= CONFIG.FRICTION;
                    let sp = Math.hypot(red.vx, red.vy);
                    if (sp > CONFIG.MAX_SPEED) { red.vx *= CONFIG.MAX_SPEED/sp; red.vy *= CONFIG.MAX_SPEED/sp; }
                    red.x += red.vx * (dt/1000); red.y += red.vy * (dt/1000);
                }
                clampInBox(red, true);
            }
            
            if (!isMultiplayer || playerRole === 'blue') {
                for(let i=0;i<5;i++) { handleCollision(); clampInBox(blue); clampInBox(red); }
            }
        }
        
        function drawWeapon(x, y, facing, type, isAxe=false, axeX=0, axeY=0) {
            ctx.save();
            ctx.translate(isAxe ? axeX : x, isAxe ? axeY : y);
            if (facing < 0 && !isAxe) ctx.scale(-1, 1);
            ctx.imageSmoothingEnabled = false;
            
            let imgKey = type === 'blaze' ? 'blaze_rod' : type;
            const img = weaponImages[imgKey];
            const loaded = imageLoaded[imgKey] && img.complete;
            const sizes = { 
                rod: [56,56,10,-30,0], axe: [64,64,8,-35,-30], tnt: [60,60,12,-28,0],
                bow: [64,64,8,-28,0], shield: [52,72,10,-28,0], bell: [56,56,8,-25,0],
                blaze_rod: [40,40,-5,-20,0]
            };
            const [w,h,ox,oy,rot] = sizes[imgKey]||[50,50,0,0,0];
            if (loaded) { 
                ctx.rotate(rot*Math.PI/180); 
                if (imgKey === 'shield' || imgKey === 'bow') { ctx.scale(-1, 1); ctx.drawImage(img, -ox-w, oy, w, h); }
                else ctx.drawImage(img, ox, oy, w, h);
            }
            ctx.restore();
        }
        
        function drawPlayer(p, col, scol, shcol) {
            const R = CONFIG.PLAYER_RADIUS;
            
            if (p.hitEffect > 0) {
                ctx.shadowColor = '#FF0000';
                ctx.shadowBlur = 20;
            } else if (p.hitWall && p.weapon === 'bell') {
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 25;
            }
            
            if (p.shieldActive) { 
                ctx.strokeStyle = shcol; ctx.lineWidth = 4; 
                ctx.beginPath(); ctx.arc(p.x, p.y, R+5, 0, 2*Math.PI); ctx.stroke(); 
            }
            
            const pulse = p.hp < 30 ? 1 + Math.sin(Date.now() * 0.02) * 0.05 : 1;
            
            ctx.beginPath(); ctx.arc(p.x, p.y, R * pulse, 0, 2*Math.PI); 
            ctx.fillStyle = col; ctx.fill(); 
            ctx.strokeStyle = scol; ctx.lineWidth = 3; ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px "Courier New"'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
            ctx.fillText(Math.floor(p.hp), p.x, p.y);
            
            if (p.weapon === 'blaze') {
                const angle = p.blazeAngle || 0;
                for (let i = 0; i < 3; i++) {
                    const rodAngle = angle + (i * 2 * Math.PI / 3);
                    const rodX = p.x + Math.cos(rodAngle) * CONFIG.BLAZE_ORBIT_RADIUS;
                    const rodY = p.y + Math.sin(rodAngle) * CONFIG.BLAZE_ORBIT_RADIUS;
                    ctx.save();
                    ctx.translate(rodX, rodY);
                    ctx.rotate(rodAngle + Math.PI/2);
                    drawWeapon(0, 0, 1, 'blaze_rod');
                    ctx.restore();
                }
            }
            
            if (p.weapon !== 'axe' && p.weapon !== 'blaze') drawWeapon(p.x, p.y, p.facing, p.weapon);
            
            if (p.bowCharging) {
                const bw = 60, bx = p.x - bw/2, by = p.y - R - 15;
                ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, 6);
                ctx.fillStyle = '#FFAA00'; ctx.fillRect(bx, by, bw * (p.bowCharge/CONFIG.BOW_MAX_CHARGE), 6);
            }
        }
        
        function draw() {
            const grad = ctx.createRadialGradient(200,150,50,350,350,500);
            grad.addColorStop(0,'#0a1622'); grad.addColorStop(1,'#03080e');
            ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle = '#e0e8ff';
            for(let i=0;i<40;i++) { if(i%2===0) continue; ctx.fillRect(30+(i*17)%W,20+(i*23)%H,2,2); }
            
            ctx.fillStyle = '#d6eaf8'; ctx.fillRect(BOX.x,BOX.y,BOX.w,BOX.h);
            ctx.strokeStyle = '#85c1e9'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(BOX.x+BOX.w/2,BOX.y); ctx.lineTo(BOX.x+BOX.w/2,BOX.y+BOX.h); ctx.stroke();
            ctx.beginPath(); ctx.arc(BOX.x+BOX.w/2,BOX.y+BOX.h/2,50,0,2*Math.PI); ctx.stroke();
            ctx.strokeStyle = '#1e3349'; ctx.lineWidth = 5; ctx.strokeRect(BOX.x,BOX.y,BOX.w,BOX.h);
            
            blazeBalls.forEach(b => {
                const img = weaponImages.fire_charge;
                if (imageLoaded.fire_charge && img.complete) {
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(Date.now() * 0.02);
                    ctx.drawImage(img, -16, -16, 32, 32);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#FF6600'; ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, 2*Math.PI); ctx.fill();
                }
            });
            
            bellWaves.forEach(w => {
                const alpha = w.life;
                ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
                ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.arc(w.x, w.y, w.radius, 0, 2*Math.PI); ctx.stroke();
                ctx.fillStyle = `rgba(255, 215, 0, ${alpha * 0.2})`; ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            poisonClouds.forEach(c => { ctx.fillStyle = `rgba(128,128,128,${c.timer/CONFIG.POISON_DURATION*0.5})`; ctx.beginPath(); ctx.arc(c.x,c.y,CONFIG.TNT_RADIUS,0,2*Math.PI); ctx.fill(); });
            tntMarks.forEach(m => { ctx.strokeStyle='#8B3A3A'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(m.x,m.y,CONFIG.TNT_RADIUS,0,2*Math.PI); ctx.stroke(); ctx.fillStyle='#8B3A3A80'; ctx.beginPath(); ctx.arc(m.x,m.y,CONFIG.TNT_RADIUS,0,2*Math.PI); ctx.fill(); });
            wallMarks.forEach(m => { ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(m.x,m.y,8,0,2*Math.PI); ctx.fill(); });
            arrows.forEach(a => { ctx.strokeStyle='#8B6914'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(a.x-a.vx*2,a.y-a.vy*2); ctx.lineTo(a.x,a.y); ctx.stroke(); ctx.fillStyle='#DAA520'; ctx.beginPath(); ctx.arc(a.x,a.y,4,0,2*Math.PI); ctx.fill(); });
            
            drawPlayer(blue,'#4a8ec9','#1e4f7a','#3DFFF0');
            drawPlayer(red,'#c95a5a','#8a2e2e','#FF4444');
            
            [blue, red].forEach(p => {
                if (p.weapon !== 'axe') return;
                let ax = p.x + Math.cos(axeAngle) * CONFIG.AXE_ORBIT_RADIUS + CONFIG.AXE_OFFSET_X;
                let ay = p.y + Math.sin(axeAngle) * CONFIG.AXE_ORBIT_RADIUS + CONFIG.AXE_OFFSET_Y;
                drawWeapon(0, 0, p === blue ? 1 : -1, 'axe', true, ax, ay);
            });
            
            [blueHook, redHook].forEach(h => { if(!h) return; ctx.beginPath(); ctx.moveTo(h.owner==='blue'?blue.x:red.x, h.owner==='blue'?blue.y:red.y); ctx.lineTo(h.x,h.y); ctx.strokeStyle='#FFFFFF'; ctx.lineWidth=2; ctx.stroke(); });
            
            if (!gameStarted) {
                ctx.fillStyle = '#000000aa'; ctx.fillRect(0,0,W,H);
                ctx.font = 'bold 34px "Courier New"'; ctx.fillStyle = '#e0e8ff'; ctx.shadowColor = '#000'; ctx.shadowBlur = 16;
                const txt = blue.hp<=0 ? 'RED WINS!' : red.hp<=0 ? 'BLUE WINS!' : 'CLICK TO START';
                ctx.fillText(txt,W/2,H/2); ctx.shadowBlur = 0;
            }
            
            let status = `${blue.weapon.toUpperCase()}: ${blue[blue.weapon+'Cooldown']>0 ? (blue[blue.weapon+'Cooldown']/60).toFixed(1)+'s' : 'READY'}`;
            if (blue.weapon === 'bell') status = `BELL: ${blue.bellCooldown>0 ? (blue.bellCooldown/60).toFixed(1)+'s' : (blue.hitWall?'ГОТОВ!':'иди к стене')}`;
            debugEl.textContent = status;
        }
        
        function gameLoop(ts) {
            if (lastTimestamp===0) { lastTimestamp=ts; animationId=requestAnimationFrame(gameLoop); return; }
            const dt = Math.min(33, ts-lastTimestamp); lastTimestamp=ts;
            
            updateMovement(dt);
            
            if (gameStarted) { 
                updateCooldowns(); 
                blue.facing = red.x > blue.x ? 1 : -1;
                red.facing = blue.x > red.x ? 1 : -1;
                botAI();
                handleInput();
                if (!isMultiplayer || playerRole === 'blue') updateProjectiles();
                if (isMultiplayer) sendGameState();
            }
            
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function resetGame() {
            resetPlayers();
            blueHook=redHook=null; tntMarks=[]; poisonClouds=[]; wallMarks=[]; arrows=[]; bellWaves=[]; blazeBalls=[]; axeCooldown=0;
            gameStarted=false; lastTimestamp=0;
        }
        
        function keyHandler(e) {
            const k = e.key;
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(k)) e.preventDefault();
            if (e.type==='keydown') {
                if (k==='ArrowUp') keys.up=true;
                if (k==='ArrowDown') keys.down=true;
                if (k==='ArrowLeft') keys.left=true;
                if (k==='ArrowRight') keys.right=true;
                if (k===' ') keys.space=true;
                if (k.toLowerCase()==='r') resetGame();
            }
            if (e.type==='keyup') {
                if (k==='ArrowUp') keys.up=false;
                if (k==='ArrowDown') keys.down=false;
                if (k==='ArrowLeft') keys.left=false;
                if (k==='ArrowRight') keys.right=false;
                if (k===' ') keys.space=false;
            }
        }
        
        function initJoystick() {
            const stick = document.getElementById('joystickStick');
            const area = document.getElementById('joystickArea');
            const maxDist = 40;
            
            const handleMove = (cx, cy) => {
                const rect = area.getBoundingClientRect();
                let dx = cx - (rect.left + rect.width/2);
                let dy = cy - (rect.top + rect.height/2);
                const dist = Math.hypot(dx, dy);
                if (dist > maxDist) { dx = dx/dist*maxDist; dy = dy/dist*maxDist; }
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector.x = dx/maxDist; joystickVector.y = dy/maxDist;
                joystickActive = true; stick.classList.add('active');
            };
            
            const handleEnd = () => {
                stick.style.transform = 'translate(-50%, -50%)';
                joystickVector.x = joystickVector.y = 0;
                joystickActive = false; stick.classList.remove('active');
                keys.up = keys.down = keys.left = keys.right = false;
            };
            
            area.addEventListener('touchstart', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); });
            area.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); });
            area.addEventListener('touchend', handleEnd);
            
            const atk = document.getElementById('attackArea');
            atk.addEventListener('touchstart', e => { e.preventDefault(); attackPressed = true; });
            atk.addEventListener('touchend', e => { e.preventDefault(); attackPressed = false; });
        }
        
        function initEvents() {
            window.addEventListener('keydown', keyHandler);
            window.addEventListener('keyup', keyHandler);
            canvas.addEventListener('click', () => { 
                if (blue.hp>0 && red.hp>0) gameStarted=true; 
                else { blue.hp=red.hp=100; gameStarted=true; } 
                lastTimestamp=performance.now(); 
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            
            document.querySelectorAll('.weapon-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    const p = btn.dataset.player, w = btn.dataset.weapon, par = btn.parentElement;
                    par.querySelectorAll('.weapon-option').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (p==='blue') { blue.weapon=w; blue.shieldActive=false; }
                    else { red.weapon=w; red.shieldActive=false; }
                });
            });
            
            document.getElementById('joystickToggle').addEventListener('click', function() {
                document.getElementById('virtualControls').classList.toggle('visible');
                this.classList.toggle('active');
            });
            
            document.getElementById('resetButton').addEventListener('click', resetGame);
            
            // Firebase кнопки
            document.getElementById('hostBtn').addEventListener('click', createRoom);
            document.getElementById('refreshBtn').addEventListener('click', refreshRoomList);
            document.getElementById('leaveBtn').addEventListener('click', leaveRoom);
            
            initJoystick();
            refreshRoomList(); // Первоначальная загрузка списка
        }
        
        function start() { initEvents(); animationId = requestAnimationFrame(gameLoop); }
        start();
    })();
</script>
</body>
